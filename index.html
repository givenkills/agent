<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AI 游戏生成助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="message-box" id="messageBox">
      <!-- 对话内容会在这里显示 -->
    </div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="输入你想要的小游戏，比如：射击游戏"
      />
      <button onclick="sendMessage()">发送</button>
    </div>
    <div style="display:flex; gap:8px; padding:0 16px 16px;">
      <button onclick="clearMemory()" style="flex:1;">清空对话</button>
      <button onclick="window.location.href='memories.html'" style="flex:1;">已存档游戏</button>
    </div>

<script>
async function clearMemory() {
  await fetch("http://127.0.0.1:5000/api/clear", {
    method: "POST"
  });
  document.getElementById('messageBox').innerHTML = '';
  localStorage.removeItem('chat_messages');
  alert("对话已清空！");
}
</script>
  </div>

  <script>
    function saveMessages() {
      const box = document.getElementById('messageBox');
      const items = [];
      for (const child of box.children) {
        const role = child.classList.contains('user') ? 'user' : 'ai';
        items.push({ role, html: child.innerHTML });
      }
      localStorage.setItem('chat_messages', JSON.stringify(items));
    }

    function restoreMessages() {
      const saved = localStorage.getItem('chat_messages');
      if (!saved) return;
      try {
        const items = JSON.parse(saved);
        const box = document.getElementById('messageBox');
        box.innerHTML = '';
        for (const item of items) {
          const div = document.createElement('div');
          div.className = 'message ' + item.role;
          div.innerHTML = item.html;
          box.appendChild(div);
        }
        box.scrollTop = box.scrollHeight;
      } catch (e) {
        // ignore
      }
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';
      saveMessages();

      const aiMsg = addMessage('ai', '正在生成游戏，请稍候...');

      try {
        const res = await fetch('http://127.0.0.1:5000/api/generate-game', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';

        aiMsg.innerHTML = '<div class="streaming-content"></div>';
        const contentDiv = aiMsg.querySelector('.streaming-content');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          fullContent += chunk;

          contentDiv.textContent = fullContent;
          aiMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        const cleanHTML = fullContent
          .replace(/^```html/, '')
          .replace(/```$/, '')
          .trim();

        if (cleanHTML) {
          const gameId = 'game_' + Date.now();
          aiMsg.innerHTML = `
            <div class="game-container" id="${gameId}">
              <div class="game-toolbar">
                <span class="game-label">游戏预览</span>
                <button class="fullscreen-btn" onclick="toggleGameFullscreen('${gameId}')">全屏</button>
              </div>
              <iframe 
                srcdoc="${cleanHTML.replace(/"/g, '&quot;')}" 
                width="100%"
                height="420px"
                frameborder="0"
                style="border-radius:0 0 8px 8px;"
                onload="this.style.height=this.contentDocument.body.scrollHeight + 20 +'px';">
              </iframe>
            </div>
          `;
        } else {
          aiMsg.textContent = fullContent;
        }
        saveMessages();
      } catch (err) {
        aiMsg.textContent = '生成失败，请检查后端是否启动';
      }
    }

    function addMessage(role, content) {
      const box = document.getElementById('messageBox');
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.innerHTML = content;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    function toggleGameFullscreen(containerId) {
      const container = document.getElementById(containerId);
      const iframe = container.querySelector('iframe');
      if (!document.fullscreenElement) {
        iframe.requestFullscreen().catch(err => {});
      } else {
        document.exitFullscreen().catch(err => {});
      }
    }

    restoreMessages();
  </script>
</body>
</html>
