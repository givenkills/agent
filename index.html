<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AI 游戏生成助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="message-box" id="messageBox">
      <!-- 对话内容会在这里显示 -->
    </div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="输入你想要的小游戏，比如：射击游戏"
      />
      <button onclick="sendMessage()">发送</button>
    </div>
    <button onclick="clearMemory()">清空对话</button>

<script>
async function clearMemory() {
  await fetch("http://127.0.0.1:5000/api/clear", {
    method: "POST"
  });
  document.getElementById('messageBox').innerHTML = '';
  alert("对话已清空！");
}
</script>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      // 显示用户消息
      addMessage('user', text);
      input.value = '';

      // 显示 AI 正在思考
      const aiMsg = addMessage('ai', '正在生成游戏，请稍候...');

      // 请求后端接口
      try {
        const res = await fetch('http://127.0.0.1:5000/api/generate-game', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text })
        });

        const htmlGame = await res.text();
        const cleanHTML = htmlGame
        .replace(/^```html/, '')  // 去掉开头 ```html
        .replace(/```$/, '')          // 去掉结尾 ```
        
        // 把返回的 HTML 游戏放进 iframe 显示
        aiMsg.innerHTML = `
          <div style="width:100%; height:480px;">
            <iframe 
    srcdoc="${cleanHTML.replace(/"/g, '&quot;')}" 
    width="100%"
    height="460px"
    frameborder="0"
    style="border-radius:8px;"
    onload="this.style.height=this.contentDocument.body.scrollHeight + 20 +'px';">
  </iframe>
          </div>
        `;
      } catch (err) {
        aiMsg.textContent = '生成失败，请检查后端是否启动';
      }
    }

    // 添加消息到界面
    function addMessage(role, content) {
      const box = document.getElementById('messageBox');
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.innerHTML = content;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
